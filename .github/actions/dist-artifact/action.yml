name: dist artifact
description: >-
  Download the tarred npm dist artifact from a release.yml run and extract it
  to distribution/npm/dist/. The artifact is a tarball because the zip-based artifact store
  drops unix file modes; extraction restores the executable bits.

inputs:
  run-id:
    description: release.yml run ID that produced the `dist` artifact
    required: true
  token:
    description: token with `actions:read` on this repo
    required: true

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with: { name: dist, path: distribution/npm/, run-id: "${{ inputs.run-id }}", github-token: "${{ inputs.token }}" }

    - run: tar -xf distribution/npm/dist.tar -C distribution/npm && rm distribution/npm/dist.tar
      shell: bash
