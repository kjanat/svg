name: crates publish
description: >-
  Publish one workspace crate to crates.io, resumably: an already-published
  version is skipped via the sparse index, and 429 rate limits — crates.io
  refills the new-crate-name allowance roughly once per ten minutes — are
  absorbed by waiting and retrying instead of failing the release.

inputs:
  crate:
    description: crate to publish
    required: true
  version:
    description: the version being published (tag without the v prefix)
    required: true
  token:
    description: crates.io token (bootstrap secret or OIDC-minted)
    required: true
  retry-wait:
    description: seconds to wait after a 429 before retrying
    required: false
    default: "630"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.token }}
        CRATE: ${{ inputs.crate }}
        VERSION: ${{ inputs.version }}
        RETRY_WAIT: ${{ inputs.retry-wait }}
      run: bash "${GITHUB_ACTION_PATH}/run.sh"
