name: publish-npm-oidc

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PLAN: ${{ inputs.plan }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Fetch npm packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: artifacts-*
          path: dist-npm/
          merge-multiple: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with: { node-version: "latest", registry-url: "https://registry.npmjs.org" }
      - name: Publish dist npm installers
        shell: bash
        run: |
          set -euo pipefail

          # Use the npm bundled with the latest Node, which supports OIDC
          # trusted publishing + `--provenance`.

          publish_pkg() {
            local source="$1"
            if [[ -n "${NPM_TOKEN:-}" ]]; then
              NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --access public "$source"
            else
              npm publish --provenance --access public "$source"
            fi
          }

          mapfile -t packages < <(
            jq -r '
              .releases[].artifacts[]?
              | select(type == "string" and endswith("-npm-package.tar.gz"))
              | split("/")[-1]
            ' <<< "$PLAN" | sort -u
          )

          for pkg in "${packages[@]}"; do
            if [[ ! "$pkg" =~ ^[A-Za-z0-9._@+-]+-npm-package\.tar\.gz$ ]]; then
              echo "::error::unexpected npm artifact filename: ${pkg}"
              exit 1
            fi
            publish_pkg "./dist-npm/${pkg}"
          done
