name: CI

# General pull-request / master quality gate. Mirrors `just verify`, but
# invokes the underlying tools directly so the job does not need the
# cargo-dist toolchain that `just verify` pulls in via `release-config-check`.
# The release pipeline lives in release.yml.

on:
  pull_request: {}
  push:
    branches: [master]

permissions: { contents: read }
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (clippy + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { persist-credentials: false }
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with: { components: clippy }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D clippy::all -D warnings
      - name: Test
        run: cargo test --workspace

  format:
    name: dprint check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { persist-credentials: false }
      # dprint's `exec` plugin shells out to rustfmt (*.rs), `cargo fmt-svg`
      # (*.svg), `tombi` (*.toml) and `just` (justfile); all must be present
      # for `dprint check` to walk the tree without erroring.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with: { components: rustfmt }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5
        with:
          tool: "dprint,just,tombi"
      - name: dprint check
        run: dprint check

  deno:
    name: Deno typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { persist-credentials: false }
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - name: Typecheck Deno scripts
        run: deno task --config scripts/deno.jsonc typecheck
