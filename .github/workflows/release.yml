# Tag-push (v*) pipeline. Multi-step logic lives in .github/actions/*.
#
#   verify ────────────────── cargo clippy + cargo test
#     ├─ create-release ───── draft GH release + notes
#     │    └─ upload-assets ─ per-target build matrix (needs: matrix);
#     │                       actions/package-asset|verify-asset
#     └─ matrix ───────────── actions/release-matrix from distribution/npm/targets.json
#   build-dist (needs: upload-assets)
#     └─ actions/download-archives → build-packages.ts → smoke;
#        artifact `dist` (tarred: keeps exec bits)
#   publish-release (needs: build-dist) ── draft → published
#     └─ call-npm-release ──→ npm-release.yml: setup (actions/npm-smoke|npm-derive)
#                              → per-package publish matrix → facades (actions/npm-publish)
---
name: release
run-name: "release ${{ github.ref_name }}"
on: { push: { tags: [v*] } }
permissions: { contents: read }
env: { CARGO_TERM_COLOR: always }

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: taiki-e/install-action@v2
        with: { tool: rust+clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D clippy::all -D warnings
      - run: cargo test --workspace

  create-release:
    name: create draft release
    needs: verify
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }

      - name: create github release
        uses: taiki-e/create-gh-release-action@v1
        with: { token: "${{ github.token }}", changelog: CHANGELOG.md, draft: true, branch: master }

      - name: append GitHub auto-generated notes
        uses: ./.github/actions/append-release-notes
        with: { tag: "${{ github.ref_name }}", token: "${{ github.token }}" }

  matrix:
    name: build matrix
    needs: verify
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs: { include: "${{ steps.gen.outputs.include }}" }
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: ".github/actions\ndistribution/npm/targets.json"
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: gen
        uses: ./.github/actions/release-matrix

  upload-assets:
    name: build+upload ${{ matrix.target }}
    needs: [matrix, create-release]
    runs-on: ${{ matrix.runner }}
    permissions: { contents: write }
    strategy: { fail-fast: false, matrix: { include: "${{ fromJSON(needs.matrix.outputs.include) }}" } }
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }

      - name: install stable rust
        if: matrix.build-tool == 'cargo-cross-toolchain'
        uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }

      - name: install nightly rust (tier-3 build-std)
        if: matrix.build-tool == 'cargo-build-std'
        uses: dtolnay/rust-toolchain@nightly
        with: { components: rust-src }

      # Tier-2/3 cross targets: installs the cross C toolchain and exports
      # CARGO_TARGET_*_LINKER so host cargo can link the target.
      - name: setup cross toolchain
        if: contains(fromJSON('["cargo-cross-toolchain", "cargo-build-std"]'), matrix.build-tool)
        uses: taiki-e/setup-cross-toolchain-action@v1
        with: { target: "${{ matrix.target }}" }

      - name: build and upload binaries (taiki-e)
        if: contains(fromJSON('["cargo", "cross", "cargo-cross-toolchain"]'), matrix.build-tool)
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          token: ${{ github.token }}
          bin: svg-language-server,svg-lint,svg-format
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool == 'cargo-cross-toolchain' && 'cargo' || matrix.build-tool }}
          archive: svg-$tag-$target
          tar: all
          zip: none
          checksum: sha256
          include: README.md,LICENSE
          locked: true

      # Tier-3: build/archive/upload manually since upload-rust-binary-action
      # can't inject `-Z build-std`.
      - name: build (cargo + -Z build-std)
        if: matrix.build-tool == 'cargo-build-std'
        env: { TARGET: "${{ matrix.target }}" }
        run: cargo +nightly build --release --locked -Z build-std --target "${TARGET}" --bin svg-language-server --bin svg-lint --bin svg-format

      - name: package and upload (cargo-build-std)
        if: matrix.build-tool == 'cargo-build-std'
        uses: ./.github/actions/package-asset
        with:
          tag: ${{ github.ref_name }}
          target: ${{ matrix.target }}
          bin-dir: ${{ github.workspace }}/target/${{ matrix.target }}/release
          token: ${{ github.token }}

      - name: verify asset uploaded
        uses: ./.github/actions/verify-asset
        with:
          tag: ${{ github.ref_name }}
          target: ${{ matrix.target }}
          token: ${{ github.token }}

  build-dist:
    name: build dist
    needs: upload-assets
    runs-on: ubuntu-latest
    permissions: { contents: write }
    env: { RELEASE_TAG: "${{ github.ref_name }}" }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }

      - uses: actions/setup-node@v6
        with: { node-version: latest }

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: download and verify release archives
        uses: ./.github/actions/download-archives
        with: { tag: "${{ github.ref_name }}", token: "${{ github.token }}" }

      - name: build npm packages
        run: node distribution/npm/scripts/build-packages.ts --version "${RELEASE_TAG#v}"

      - name: add bin dirs to path
        run: |
          {
            echo "${GITHUB_WORKSPACE}/distribution/npm/dist/lint-linux-x64-gnu/bin"
            echo "${GITHUB_WORKSPACE}/distribution/npm/dist/format-linux-x64-gnu/bin"
            echo "${GITHUB_WORKSPACE}/distribution/npm/dist/language-server-linux-x64-gnu/bin"
          } >> "${GITHUB_PATH}"

      # Only target executable on ubuntu-latest; others exercised at install.
      - name: smoke-test packaged linux-x64-gnu binaries
        run: |
          svg-lint --version
          svg-format --version
          svg-language-server --version

      - name: tar dist (preserve file modes)
        run: tar -cf distribution/npm/dist.tar -C distribution/npm dist

      - name: upload dist artifact
        uses: actions/upload-artifact@v7
        with: { name: dist, path: distribution/npm/dist.tar, retention-days: 14, if-no-files-found: error }

  publish-release:
    name: publish github release
    needs: [build-dist]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ github.ref_name }}" }
    steps: [run: 'gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false']

  call-npm-release:
    name: npm publish
    needs: [publish-release]
    permissions: { contents: read, id-token: write, actions: read }
    uses: ./.github/workflows/npm-release.yml
    with: { tag: "${{ github.ref_name }}", run-id: "${{ github.run_id }}" }

  call-crates-release:
    name: crates publish
    needs: [publish-release]
    permissions: { contents: read, id-token: write }
    uses: ./.github/workflows/crates-release.yml
    with: { tag: "${{ github.ref_name }}" }
