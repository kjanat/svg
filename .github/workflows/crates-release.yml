---
name: crates-release
run-name: "crates publish ${{ inputs.tag }}"

on:
  workflow_call: { inputs: { tag: { required: true, type: string } } }
  workflow_dispatch:
    inputs:
      tag: { description: Release tag to publish (e.g. vX.Y.Z), required: true, type: string }
      dry-run: { description: Dry run only (no upload to crates.io), required: false, default: false, type: boolean }

permissions: { contents: read }

env:
  RELEASE_TAG: ${{ inputs.tag }}
  INPUT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
  CARGO_TERM_COLOR: always
  # Bootstrap fallback: crates.io trusted publishing is configured per
  # existing crate, so the first publish of each crate needs a real token.
  # Once every crate has a trusted publisher, delete the secret and the
  # OIDC mint below takes over.
  CRATES_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    # First-ever release: 11 new crate names against a small burst allowance
    # refilled ~1/10min means the publish loop can legitimately take >1h.
    timeout-minutes: 150
    permissions: { contents: read, id-token: write }
    environment: { name: crates-io }
    steps:
      - uses: actions/checkout@v7
        with: { ref: "refs/tags/${{ env.RELEASE_TAG }}", persist-credentials: false }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: verify tag matches Cargo.toml version
        id: verify
        uses: ./.github/actions/verify-tag-version
        with: { tag: "${{ env.RELEASE_TAG }}" }

      # Resolves the intra-workspace dependency DAG and publishes the 11
      # publishable crates in order; `publish = false` members are skipped.
      - name: cargo publish (dry run)
        if: env.INPUT_DRY_RUN == 'true'
        run: cargo publish --workspace --locked --dry-run --no-verify

      - name: mint crates.io token (trusted publishing)
        if: env.INPUT_DRY_RUN != 'true' && env.CRATES_TOKEN == ''
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish
        if: env.INPUT_DRY_RUN != 'true'
        uses: ./.github/actions/crates-publish
        with:
          token: ${{ env.CRATES_TOKEN || steps.auth.outputs.token }}
          version: ${{ steps.verify.outputs.version }}
