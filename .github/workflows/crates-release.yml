---
name: crates-release
run-name: "crates publish ${{ inputs.tag }}"

on:
  workflow_call: { inputs: { tag: { required: true, type: string } } }
  workflow_dispatch:
    inputs:
      tag: { description: Release tag to publish (e.g. vX.Y.Z), required: true, type: string }
      dry-run: { description: Dry run only (no upload to crates.io), required: false, default: false, type: boolean }

permissions: { contents: read }

# Serialize publish runs per tag without cancelling an in-flight publish.
concurrency: { group: "crates-release-${{ inputs.tag }}", cancel-in-progress: false }

env:
  RELEASE_TAG: ${{ inputs.tag }}
  CARGO_TERM_COLOR: always

jobs:
  setup:
    name: verify + publish order
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    outputs:
      version: ${{ steps.verify.outputs.version }}
      crates: ${{ steps.order.outputs.crates }}
    steps:
      # Action code from the default branch (fixable without moving the tag,
      # no tag-supplied action code); crate sources from the tag, in source/.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { ref: "refs/tags/${{ env.RELEASE_TAG }}", persist-credentials: false, path: source }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { toolchain: stable }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: source }

      - name: verify tag matches Cargo.toml version
        id: verify
        uses: ./.github/actions/verify-tag-version
        with: { tag: "${{ env.RELEASE_TAG }}", source-dir: source }

      - name: derive publish order
        id: order
        uses: ./.github/actions/publish-order
        with: { source-dir: source }

  publish:
    name: publish ${{ matrix.crate }}
    needs: setup
    if: inputs.dry-run != true
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # id-token: write lets crates.io trusted publishing mint a short-lived token.
    permissions: { contents: read, id-token: write }
    environment: { name: crates-io, url: "https://crates.io/crates/${{ matrix.crate }}/${{ needs.setup.outputs.version }}" }
    strategy: { max-parallel: 1, fail-fast: true, matrix: { include: "${{ fromJSON(needs.setup.outputs.crates) }}" } }
    env: { HAS_CRATES_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN != '' }}" }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { ref: "refs/tags/${{ env.RELEASE_TAG }}", persist-credentials: false, path: source }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with: { toolchain: stable }
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with: { workspaces: source }

      - name: mint crates.io token (trusted publishing)
        if: env.HAS_CRATES_TOKEN != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: cargo publish
        uses: ./.github/actions/crates-publish
        with:
          crate: ${{ matrix.crate }}
          version: ${{ needs.setup.outputs.version }}
          token: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.auth.outputs.token }}
          source-dir: source
